name: radio_udaan_app
description: Radio Udaan — accessibility-first community radio app (Android + iOS).
publish_to: 'none'
version: 2.0.0+28

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  just_audio: ^0.9.46
  audio_session: ^0.1.25
  file_picker: ^8.3.7
  youtube_player_iframe: ^5.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  audio_service: ^0.18.18
  permission_handler: ^11.4.0
  google_fonts: ^6.2.1
  country_picker: ^2.0.27
  share_plus: ^12.0.2
  image_picker: ^1.1.2
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.5
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.0.0
  flutter_widget_from_html: ^0.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  http: ^1.4.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  # Same asset as WP RadioUdaan_App_Branding::get_logo_url() theme fallback (logo.png).
  image_path: assets/images/radio_udaan_logo.png
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/images/radio_udaan_logo.png
  background_color_ios: '#FFFFFF'
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false
  assets:
    - assets/images/radio_udaan_logo.png
