# Build Radio Udaan iOS IPA in the cloud (download artifact → upload manually to TestFlight).
# No App Store Connect API key required.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APPLE_TEAM_ID                          — 10-char Team ID (Membership details)
#   IOS_DISTRIBUTION_CERTIFICATE_BASE64    — Apple Distribution .p12 (base64)
#   IOS_DISTRIBUTION_CERTIFICATE_PASSWORD  — .p12 export password
#   IOS_PROVISIONING_PROFILE_BASE64        — App Store profile for org.reactjs.native.example.Radio
#   IOS_PROVISIONING_PROFILE_NAME          — Exact profile name in Apple Developer
#
# After the workflow finishes: Actions → run → Artifacts → download .ipa
# Upload with Transporter (Mac) or Xcode Organizer to App Store Connect → TestFlight.
#
# Setup guide: scripts/ios-github-secrets-setup.sh
name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API base URL baked into the build'
        required: false
        default: 'https://nexusfleck.com/radioudaan/wp-json/radioudaan/v1'
  push:
    branches: [main, master, staging]
    paths:
      - 'radio_udaan_app/**'
      - '.github/workflows/build-ios-testflight.yml'

permissions:
  contents: read

env:
  STAGING_API_BASE_URL: https://nexusfleck.com/radioudaan/wp-json/radioudaan/v1
  IOS_BUNDLE_ID: org.reactjs.native.example.Radio

jobs:
  build-ios-ipa:
    name: iOS IPA (manual TestFlight upload)
    runs-on: macos-14
    defaults:
      run:
        working-directory: radio_udaan_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          missing=0
          for key in APPLE_TEAM_ID IOS_DISTRIBUTION_CERTIFICATE_BASE64 IOS_DISTRIBUTION_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE_BASE64 IOS_PROVISIONING_PROFILE_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Configure secrets: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Run locally: bash scripts/ios-github-secrets-setup.sh"
            exit 1
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "Installed provisioning profile $PROFILE_UUID"

      - name: Prepare ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          sed \
            -e "s/__APPLE_TEAM_ID__/${APPLE_TEAM_ID}/g" \
            -e "s/__PROVISIONING_PROFILE_NAME__/${IOS_PROVISIONING_PROFILE_NAME}/g" \
            ios/ExportOptions.plist > ios/ExportOptions.ci.plist
          /usr/libexec/PlistBuddy -c 'Print' ios/ExportOptions.ci.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fail fast)
        run: dart analyze lib

      - name: Build release IPA
        env:
          API_BASE_URL: ${{ github.event.inputs.api_base_url || env.STAGING_API_BASE_URL }}
        run: |
          flutter build ipa --release \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --export-options-plist=ios/ExportOptions.ci.plist

      - name: Locate IPA
        id: ipa
        run: echo "path=$(ls build/ios/ipa/*.ipa | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-udan-ios-${{ github.sha }}
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          ls -lh build/ios/ipa/
          echo "Bundle ID: ${{ env.IOS_BUNDLE_ID }}"
          echo "API_BASE_URL=${{ github.event.inputs.api_base_url || env.STAGING_API_BASE_URL }}"
          echo ""
          echo "Download the .ipa from this workflow's Artifacts, then upload with Transporter or Xcode."
