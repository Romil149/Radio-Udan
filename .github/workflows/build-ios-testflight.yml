# Build Radio Udaan iOS IPA in the cloud; optionally upload to TestFlight.
#
# Required signing secrets (5):
#   APPLE_TEAM_ID, IOS_DISTRIBUTION_CERTIFICATE_BASE64, IOS_DISTRIBUTION_CERTIFICATE_PASSWORD,
#   IOS_PROVISIONING_PROFILE_BASE64, IOS_PROVISIONING_PROFILE_NAME
#
# Optional TestFlight auto-upload (3):
#   APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_API_PRIVATE_KEY
#
# Setup guide: scripts/ios-github-secrets-setup.sh
name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API base URL baked into the build'
        required: false
        default: 'https://nexusfleck.com/radioudaan/wp-json/radioudaan/v1'
      upload_testflight:
        description: 'Upload to TestFlight when API secrets are configured'
        required: false
        default: true
        type: boolean
  push:
    branches: [main, master, staging]
    paths:
      - 'radio_udaan_app/**'
      - '.github/workflows/build-ios-testflight.yml'

permissions:
  contents: read

env:
  STAGING_API_BASE_URL: https://nexusfleck.com/radioudaan/wp-json/radioudaan/v1
  IOS_BUNDLE_ID: org.reactjs.native.example.Radio

jobs:
  build-ios-ipa:
    name: iOS IPA → TestFlight
    runs-on: macos-14
    defaults:
      run:
        working-directory: radio_udaan_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          missing=0
          for key in APPLE_TEAM_ID IOS_DISTRIBUTION_CERTIFICATE_BASE64 IOS_DISTRIBUTION_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE_BASE64 IOS_PROVISIONING_PROFILE_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Configure secrets: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "Run locally: bash scripts/ios-github-secrets-setup.sh"
            exit 1
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}

      - name: Check TestFlight API secrets
        id: testflight_api
        run: |
          if [ -n "$ISSUER" ] && [ -n "$KEY_ID" ] && [ -n "$PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "TestFlight API secrets found — will upload after build."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "TestFlight API secrets missing — IPA artifact only (manual upload)."
          fi
        env:
          ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -passin "pass:${P12_PASSWORD}" -noout 2>/dev/null; then
            echo "::error::Cannot open .p12 — wrong IOS_DISTRIBUTION_CERTIFICATE_PASSWORD or corrupted IOS_DISTRIBUTION_CERTIFICATE_BASE64."
            echo "Fix locally: bash scripts/ios-verify-and-encode-p12.sh .ios-signing/distribution.p12"
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "Installed provisioning profile $PROFILE_UUID"

      - name: Prepare ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          sed \
            -e "s/__APPLE_TEAM_ID__/${APPLE_TEAM_ID}/g" \
            -e "s/__PROVISIONING_PROFILE_NAME__/${IOS_PROVISIONING_PROFILE_NAME}/g" \
            ios/ExportOptions.plist > ios/ExportOptions.ci.plist
          /usr/libexec/PlistBuddy -c 'Print' ios/ExportOptions.ci.plist

      - name: Configure manual signing for CI
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: bash ../scripts/ios-ci-configure-signing.sh "$APPLE_TEAM_ID" "$IOS_PROVISIONING_PROFILE_NAME"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fail fast)
        run: dart analyze lib

      - name: Build release IPA
        env:
          API_BASE_URL: ${{ github.event.inputs.api_base_url || env.STAGING_API_BASE_URL }}
        run: |
          flutter build ipa --release \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --export-options-plist=ios/ExportOptions.ci.plist

      - name: Locate IPA
        id: ipa
        run: |
          IPA_REL=$(ls build/ios/ipa/*.ipa | head -1)
          echo "path=radio_udaan_app/${IPA_REL}" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA_REL"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-udan-ios-${{ github.sha }}
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload to TestFlight
        if: >-
          steps.testflight_api.outputs.ready == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.upload_testflight)
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Build summary
        run: |
          ls -lh build/ios/ipa/
          echo "Bundle ID: ${{ env.IOS_BUNDLE_ID }}"
          echo "API_BASE_URL=${{ github.event.inputs.api_base_url || env.STAGING_API_BASE_URL }}"
          if [ "${{ steps.testflight_api.outputs.ready }}" = "true" ]; then
            echo "TestFlight upload: attempted (check App Store Connect → TestFlight)."
          else
            echo "TestFlight upload: skipped — add APP_STORE_CONNECT_* secrets or download Artifacts."
          fi
