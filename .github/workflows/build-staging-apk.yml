# Build Radio Udaan Android APK in the cloud (no local Android SDK required).
# Download the APK from Actions → workflow run → Artifacts.
name: Build staging APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - staging
      - 'cursor/**'
    paths:
      - 'radio_udaan_app/**'
      - '.github/workflows/build-staging-apk.yml'

env:
  STAGING_API_BASE_URL: https://nexusfleck.com/radioudaan/wp-json/radioudaan/v1

jobs:
  build-android:
    name: Android tester APK (staging API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: radio_udaan_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('radio_udaan_app/android/**/*.gradle*', 'radio_udaan_app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Precache Android tooling
        run: flutter precache --android

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Android SDK 36
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fail fast)
        run: dart analyze lib

      - name: Build tester APK
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=${{ env.STAGING_API_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-udan-staging-debug-${{ github.sha }}
          path: radio_udaan_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          APK="build/app/outputs/flutter-apk/app-debug.apk"
          ls -lh "$APK"
          echo "API_BASE_URL=${{ env.STAGING_API_BASE_URL }}"
